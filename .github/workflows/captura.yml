name: captura

on:
  workflow_dispatch:
  schedule:
    # Espelha o v1 (BRT = UTC-3, dias úteis): a cada 20 min 07:00-21:40,
    # + 22:00, + captura matinal 05:00.
    - cron: "0,20,40 10-23 * * 1-5"   # 07:00-20:40 BRT seg-sex
    - cron: "0,20,40 0 * * 2-6"       # 21:00-21:40 BRT seg-sex
    - cron: "0 1 * * 2-6"             # 22:00 BRT seg-sex
    - cron: "0 8 * * 1-5"             # 05:00 BRT seg-sex

concurrency:
  group: captura
  cancel-in-progress: false

jobs:
  captura:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: rodar captura
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python capture/captura.py

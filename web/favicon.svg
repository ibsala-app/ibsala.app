<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- fundo azul escuro -->
  <rect width="32" height="32" rx="4" fill="#002555"/>
  <!-- barra dourada na base -->
  <rect x="0" y="26" width="32" height="6" fill="#F5AC00"/>
  <!-- letra I: serif top + stem + serif bottom (x 8–14) -->
  <rect x="8"  y="8"  width="6" height="2" fill="#fff"/>
  <rect x="10" y="10" width="2" height="10" fill="#fff"/>
  <rect x="8"  y="20" width="6" height="2" fill="#fff"/>
  <!-- letra S: 5 barras formando o S (x 16–23) -->
  <rect x="16" y="8"  width="7" height="2" fill="#fff"/>
  <rect x="16" y="10" width="2" height="4" fill="#fff"/>
  <rect x="16" y="14" width="7" height="2" fill="#fff"/>
  <rect x="21" y="16" width="2" height="4" fill="#fff"/>
  <rect x="16" y="20" width="7" height="2" fill="#fff"/>
</svg>
